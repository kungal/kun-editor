name: docs-image

# Build the docs site image and push it to GHCR (GHCR + Actions -> your host
# pulls the prebuilt image). Production never builds.
on:
  # Manual / API dispatch - the Release workflow kicks this after a version bump
  # (whose commit is [skip ci]) so the /changelog page rebuilds with the new entry.
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'docker/docs.Dockerfile'
      - '.dockerignore'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs-image.yml'

permissions:
  contents: read
  packages: write # push to GHCR

concurrency:
  group: docs-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/docs.Dockerfile
          push: true
          tags: |
            ghcr.io/kungal/kun-editor-docs:latest
            ghcr.io/kungal/kun-editor-docs:${{ github.sha }}
          cache-from: type=gha,scope=kun-editor-docs
          cache-to: type=gha,mode=max,scope=kun-editor-docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger redeploy webhook
        env:
          # Set this repo secret to your host's deploy webhook (e.g. Dokploy) so
          # it pulls the freshly-built :latest. Unset -> image pushed, no redeploy.
          WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK_DOCS }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DOKPLOY_WEBHOOK_DOCS not set; image pushed to GHCR, skipping redeploy."
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
